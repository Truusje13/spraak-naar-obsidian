<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Notitie → Obsidian</title>
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 16px 20px;
            background: #16213e;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header svg {
            width: 28px;
            height: 28px;
            fill: #7c5cbf;
        }

        header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #c5b3e6;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 12px;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }

        .title-input {
            background: #16213e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 1rem;
            color: #e0e0e0;
            outline: none;
            transition: border-color 0.2s;
        }

        .title-input:focus {
            border-color: #7c5cbf;
        }

        .title-input::placeholder {
            color: #555;
        }

        .tags-input {
            background: #16213e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 0.9rem;
            color: #e0e0e0;
            outline: none;
            transition: border-color 0.2s;
        }

        .tags-input:focus {
            border-color: #7c5cbf;
        }

        .tags-input::placeholder {
            color: #555;
        }

        .transcript-area {
            flex: 1;
            background: #16213e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 16px;
            min-height: 200px;
            overflow-y: auto;
        }

        .transcript-text {
            font-size: 1rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .transcript-text .interim {
            color: #888;
            font-style: italic;
        }

        .placeholder-text {
            color: #555;
            font-style: italic;
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 12px 0;
        }

        .record-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #7c5cbf;
            background: #1a1a2e;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .record-btn:active {
            transform: scale(0.95);
        }

        .record-btn .inner {
            width: 32px;
            height: 32px;
            background: #7c5cbf;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .record-btn.recording {
            border-color: #e74c3c;
            animation: pulse 1.5s infinite;
        }

        .record-btn.recording .inner {
            background: #e74c3c;
            border-radius: 6px;
            width: 28px;
            height: 28px;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
            50% { box-shadow: 0 0 0 12px rgba(231, 76, 60, 0); }
        }

        .record-label {
            font-size: 0.85rem;
            color: #888;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .action-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .action-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .action-btn:not(:disabled):active {
            transform: scale(0.97);
        }

        .btn-share {
            background: #7c5cbf;
            color: white;
        }

        .btn-copy {
            background: #2a2a4a;
            color: #c5b3e6;
        }

        .btn-clear {
            background: #2a2a4a;
            color: #e74c3c;
        }

        .action-btn svg {
            width: 18px;
            height: 18px;
        }

        .status-bar {
            padding: 8px 16px;
            text-align: center;
            font-size: 0.8rem;
            color: #555;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            z-index: 100;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .mode-toggle {
            display: flex;
            background: #16213e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            overflow: hidden;
        }

        .mode-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #888;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .mode-btn.active {
            background: #7c5cbf;
            color: white;
        }

        .mode-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .language-toggle {
            display: flex;
            background: #16213e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            overflow: hidden;
        }

        .lang-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: #888;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .lang-btn.active {
            background: #7c5cbf;
            color: white;
        }

        .text-input-area {
            flex: 1;
            background: #16213e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 16px;
            min-height: 200px;
            font-size: 1rem;
            line-height: 1.6;
            color: #e0e0e0;
            font-family: inherit;
            resize: none;
            outline: none;
            display: none;
        }

        .text-input-area:focus {
            border-color: #7c5cbf;
        }

        .text-input-area::placeholder {
            color: #555;
            font-style: italic;
        }
    </style>
</head>
<body>
    <header>
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        <h1>Notitie → Obsidian</h1>
    </header>

    <div class="container">
        <input type="text" class="title-input" id="titleInput" placeholder="Titel (optioneel)">

        <input type="text" class="tags-input" id="tagsInput" placeholder="Tags: bijv. idee, dagboek, werk">

        <div class="mode-toggle">
            <button class="mode-btn active" data-mode="voice">
                <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                Spraak
            </button>
            <button class="mode-btn" data-mode="text">
                <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                Tekst
            </button>
        </div>

        <div id="voiceMode" style="display:flex;flex-direction:column;gap:12px;">
            <div class="language-toggle">
                <button class="lang-btn active" data-lang="nl-NL">🇳🇱 Nederlands</button>
                <button class="lang-btn" data-lang="en-US">🇬🇧 English</button>
                <button class="lang-btn" data-lang="de-DE">🇩🇪 Deutsch</button>
            </div>

            <div class="transcript-area" id="transcriptArea">
                <div class="placeholder-text" id="placeholder">
                    Tik op de microfoon en begin te praten...
                </div>
                <div class="transcript-text" id="transcriptText"></div>
            </div>

            <div class="controls">
                <button class="record-btn" id="recordBtn">
                    <div class="inner"></div>
                </button>
                <div class="record-label" id="recordLabel">Tik om op te nemen</div>
            </div>
        </div>

        <div id="textMode" style="display:none;">
            <textarea class="text-input-area" id="textInput" placeholder="Typ hier je notitie..." style="display:block;"></textarea>
        </div>

        <div class="action-buttons">
            <button class="action-btn btn-share" id="shareBtn" disabled>
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
                Deel naar Obsidian
            </button>
            <button class="action-btn btn-copy" id="copyBtn" disabled>
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                Kopieer
            </button>
        </div>

        <button class="action-btn btn-clear" id="clearBtn" disabled>
            Wis alles
        </button>
    </div>

    <div class="status-bar" id="statusBar"></div>
    <div class="toast" id="toast"></div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            document.getElementById('placeholder').textContent =
                'Spraakherkenning wordt niet ondersteund. Gebruik Chrome op Android.';
        }

        let recognition;
        let isRecording = false;
        let finalTranscript = '';

        const recordBtn = document.getElementById('recordBtn');
        const recordLabel = document.getElementById('recordLabel');
        const transcriptText = document.getElementById('transcriptText');
        const placeholder = document.getElementById('placeholder');
        const shareBtn = document.getElementById('shareBtn');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');
        const titleInput = document.getElementById('titleInput');
        const tagsInput = document.getElementById('tagsInput');
        const toast = document.getElementById('toast');
        const statusBar = document.getElementById('statusBar');

        const textInput = document.getElementById('textInput');
        const voiceMode = document.getElementById('voiceMode');
        const textModeEl = document.getElementById('textMode');
        let currentMode = 'voice';
        let currentLang = 'nl-NL';

        // Mode toggle
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.mode;
                if (currentMode === 'voice') {
                    voiceMode.style.display = '';
                    textModeEl.style.display = 'none';
                    if (isRecording) stopRecording();
                } else {
                    voiceMode.style.display = 'none';
                    textModeEl.style.display = '';
                    if (isRecording) stopRecording();
                    textInput.focus();
                }
                updateButtons();
            });
        });

        // Language toggle
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLang = btn.dataset.lang;
                if (isRecording) {
                    stopRecording();
                    startRecording();
                }
            });
        });

        function initRecognition() {
            recognition = new SpeechRecognition();
            recognition.lang = currentLang;
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = (event) => {
                let interim = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const result = event.results[i];
                    if (result.isFinal) {
                        finalTranscript += result[0].transcript + ' ';
                    } else {
                        interim += result[0].transcript;
                    }
                }
                updateDisplay(interim);
            };

            recognition.onerror = (event) => {
                if (event.error === 'no-speech') {
                    statusBar.textContent = 'Geen spraak gedetecteerd, luistert nog...';
                    return;
                }
                if (event.error === 'aborted') return;
                showToast('Fout: ' + event.error);
                stopRecording();
            };

            recognition.onend = () => {
                if (isRecording) {
                    // Auto-restart if still recording
                    try {
                        recognition.start();
                    } catch (e) {
                        stopRecording();
                    }
                }
            };
        }

        function updateDisplay(interim) {
            placeholder.style.display = 'none';
            let html = escapeHtml(finalTranscript);
            if (interim) {
                html += '<span class="interim">' + escapeHtml(interim) + '</span>';
            }
            transcriptText.innerHTML = html;

            // Scroll to bottom
            const area = document.getElementById('transcriptArea');
            area.scrollTop = area.scrollHeight;

            updateButtons();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getContent() {
            if (currentMode === 'voice') {
                return finalTranscript.trim();
            } else {
                return textInput.value.trim();
            }
        }

        function updateButtons() {
            const hasText = getContent().length > 0;
            shareBtn.disabled = !hasText;
            copyBtn.disabled = !hasText;
            clearBtn.disabled = !hasText;
        }

        // Update buttons when typing in text mode
        textInput.addEventListener('input', updateButtons);

        function startRecording() {
            initRecognition();
            recognition.lang = currentLang;
            try {
                recognition.start();
                isRecording = true;
                recordBtn.classList.add('recording');
                recordLabel.textContent = 'Tik om te stoppen';
                statusBar.textContent = 'Luistert...';
            } catch (e) {
                showToast('Kan microfoon niet starten');
            }
        }

        function stopRecording() {
            if (recognition) {
                isRecording = false;
                recognition.stop();
            }
            recordBtn.classList.remove('recording');
            recordLabel.textContent = 'Tik om op te nemen';
            statusBar.textContent = '';
        }

        recordBtn.addEventListener('click', () => {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        });

        function generateMarkdown() {
            const title = titleInput.value.trim();
            const tags = tagsInput.value.trim();
            const text = getContent();
            const now = new Date();

            const dateStr = now.toISOString().split('T')[0];
            const timeStr = now.toLocaleTimeString('nl-NL', {
                hour: '2-digit',
                minute: '2-digit'
            });

            const noteType = currentMode === 'voice' ? 'spraaknotitie' : 'tekstnotitie';

            let md = '---\n';
            md += 'datum: ' + dateStr + '\n';
            md += 'tijd: ' + timeStr + '\n';
            md += 'type: ' + noteType + '\n';
            if (tags) {
                const tagList = tags.split(',').map(t => t.trim()).filter(t => t);
                md += 'tags:\n';
                tagList.forEach(t => {
                    md += '  - ' + t + '\n';
                });
            }
            md += '---\n\n';

            if (title) {
                md += '# ' + title + '\n\n';
            }

            md += text + '\n';

            return md;
        }

        function generateFilename() {
            const title = titleInput.value.trim();
            const now = new Date();
            const dateStr = now.toISOString().split('T')[0];
            const timeStr = now.toLocaleTimeString('nl-NL', {
                hour: '2-digit',
                minute: '2-digit'
            }).replace(':', '');

            if (title) {
                return dateStr + ' ' + title + '.md';
            }
            const prefix = currentMode === 'voice' ? 'Spraaknotitie' : 'Notitie';
            return dateStr + ' ' + prefix + ' ' + timeStr + '.md';
        }

        // Share to Obsidian
        shareBtn.addEventListener('click', async () => {
            const md = generateMarkdown();
            const filename = generateFilename();

            if (navigator.share) {
                try {
                    // Try sharing as file first (better for Obsidian)
                    const file = new File([md], filename, { type: 'text/markdown' });
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            files: [file],
                            title: titleInput.value.trim() || 'Spraaknotitie'
                        });
                    } else {
                        // Fallback: share as text
                        await navigator.share({
                            title: titleInput.value.trim() || 'Spraaknotitie',
                            text: md
                        });
                    }
                    showToast('Gedeeld!');
                } catch (e) {
                    if (e.name !== 'AbortError') {
                        showToast('Delen mislukt, tekst gekopieerd');
                        copyToClipboard(md);
                    }
                }
            } else {
                // No Web Share API, copy instead
                copyToClipboard(md);
                showToast('Gekopieerd! Plak in Obsidian.');
            }
        });

        // Copy
        copyBtn.addEventListener('click', () => {
            copyToClipboard(generateMarkdown());
            showToast('Markdown gekopieerd!');
        });

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).catch(() => {
                // Fallback
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            });
        }

        // Clear
        clearBtn.addEventListener('click', () => {
            finalTranscript = '';
            transcriptText.innerHTML = '';
            textInput.value = '';
            titleInput.value = '';
            tagsInput.value = '';
            placeholder.style.display = 'block';
            updateButtons();
            showToast('Gewist');
        });

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
